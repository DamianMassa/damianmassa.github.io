<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damian Massa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --white: #f0ede8;
      --dim: #2a2a2a;
      --line: rgba(240, 237, 232, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Tenor Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 14px;
    }

    .name span {
      display: block;
    }

    .name .last {
      font-weight: 600;
      font-style: italic;
    }

    .tagline {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.35);
    }

    /* Separator */
    .sep {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--white), transparent);
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    /* Links */
    .links {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-item {
      opacity: 0;
      transform: translateY(12px);
    }

    .link-item:nth-child(1) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards; }
    .link-item:nth-child(2) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.80s forwards; }
    .link-item:nth-child(3) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.95s forwards; }
    .link-item:nth-child(4) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.10s forwards; }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 24px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--white);
      text-decoration: none;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.4s ease, background 0.4s ease, letter-spacing 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--white);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .link-btn:hover {
      border-color: rgba(240, 237, 232, 0.4);
      letter-spacing: 0.34em;
      color: var(--white);
    }

    .link-btn:hover::after {
      opacity: 0.04;
    }

    .link-icon {
      width: 16px;
      height: 16px;
      opacity: 0.4;
      flex-shrink: 0;
      transition: opacity 0.3s ease;
    }

    .link-btn:hover .link-icon {
      opacity: 0.9;
    }

    /* Arrow icon */
    .arrow {
      font-size: 0.8rem;
      opacity: 0.3;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .link-btn:hover .arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Footer */
    .footer {
      margin-top: 72px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.15);
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* SVG icons inline */
    .icon-instagram { color: #f0ede8; }
  </style>
</head>
