<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damian Massa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --white: #f0ede8;
      --dim: #2a2a2a;
      --line: rgba(240, 237, 232, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Tenor Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 64px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 14px;
    }

    .name span {
      display: block;
    }

    .name .last {
      font-weight: 600;
      font-style: italic;
    }

    .tagline {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.35);
    }

    /* Separator */
    .sep {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--white), transparent);
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    /* Links */
    .links {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-item {
      opacity: 0;
      transform: translateY(12px);
    }

    .link-item:nth-child(1) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards; }
    .link-item:nth-child(2) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.80s forwards; }
    .link-item:nth-child(3) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.95s forwards; }
    .link-item:nth-child(4) { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.10s forwards; }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 24px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--white);
      text-decoration: none;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.4s ease, background 0.4s ease, letter-spacing 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--white);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .link-btn:hover {
      border-color: rgba(240, 237, 232, 0.4);
      letter-spacing: 0.34em;
      color: var(--white);
    }

    .link-btn:hover::after {
      opacity: 0.04;
    }

    .link-icon {
      width: 16px;
      height: 16px;
      opacity: 0.4;
      flex-shrink: 0;
      transition: opacity 0.3s ease;
    }

    .link-btn:hover .link-icon {
      opacity: 0.9;
    }

    /* Arrow icon */
    .arrow {
      font-size: 0.8rem;
      opacity: 0.3;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .link-btn:hover .arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Footer */
    .footer {
      margin-top: 72px;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240, 237, 232, 0.15);
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* SVG icons inline */
    .icon-instagram { color: #f0ede8; }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <img src="logo.jpg" alt="Damian Massa" style="width:220px; opacity:0.95;" />
      <p class="tagline">DJ · Producer · Afro &amp; Tech House</p>
    </header>

    <div class="sep"></div>

    <nav class="links">

      <!-- Instagram -->
      <div class="link-item">
        <a class="link-btn" href="https://instagram.com/damianmassa" target="_blank" rel="noopener">
          <div class="link-left">
            <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
            Instagram
          </div>
          <span class="arrow">→</span>
        </a>
      </div>

      <!-- SoundCloud -->
      <div class="link-item">
        <a class="link-btn" href="https://soundcloud.com/damianmassa" target="_blank" rel="noopener">
          <div class="link-left">
            <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M1.5 13.5c0 1.38 1.12 2.5 2.5 2.5h.5v-5H4c-1.38 0-2.5 1.12-2.5 2.5zm4.5 2.5h1V9.8c-.32-.18-.67-.3-1-.3v6.5zm2 0h1V9c-.33.07-.67.18-1 .33v6.67zm2 0h1V8.5c-.33.15-.67.32-1 .5v6.5zm2 0h1V8c-.32.08-.66.18-1 .3v6.7zm2-8.5c-.18 0-.36.02-.53.05C13.2 6.03 11.9 5 10.5 5 8.84 5 7.5 6.34 7.5 8v8h9.5c1.38 0 2.5-1.12 2.5-2.5S18.38 11 17 11c-.1 0-.2.01-.3.02C16.5 9.34 15.12 8 13.5 8c-.17 0-.33.01-.5.02V7.5z"/>
            </svg>
            SoundCloud
          </div>
          <span class="arrow">→</span>
        </a>
      </div>

      <!-- Spotify -->
      <div class="link-item">
        <a class="link-btn" href="https://open.spotify.com/artist/damianmassa" target="_blank" rel="noopener">
          <div class="link-left">
            <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.65 14.42c-.19.31-.6.4-.9.2-2.48-1.52-5.6-1.86-9.27-1.02-.35.08-.71-.14-.79-.49-.08-.35.14-.71.49-.79 4.02-.92 7.47-.52 10.26 1.18.31.19.4.6.21.92zm1.24-2.76c-.24.38-.74.5-1.12.26-2.84-1.74-7.17-2.25-10.53-1.23-.43.13-.89-.11-1.02-.54-.13-.43.11-.89.54-1.02 3.84-1.16 8.61-.6 11.87 1.4.38.24.5.75.26 1.13zm.11-2.87C14.62 8.86 9.57 8.7 6.61 9.58c-.52.16-1.07-.14-1.22-.66-.16-.52.14-1.07.66-1.22 3.43-1.04 9.13-.84 12.73 1.44.46.28.61.88.33 1.34-.28.46-.88.61-1.34.33z"/>
            </svg>
            Spotify ( Soon )
        
          </div>
          <span class="arrow">→</span>
        </a>
      </div>

      <!-- Trackstack -->
      <div class="link-item">
        <a class="link-btn" href="https://trackstack.io/damianmassa" target="_blank" rel="noopener">
          <div class="link-left">
            <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            Trackstack ( Soon )
          </div>
          <span class="arrow">→</span>
        </a>
      </div>

    </nav>

    <footer class="footer">© 2026 Damian Massa</footer>

  </div>
</body>
</html>
